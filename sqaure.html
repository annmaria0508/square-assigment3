<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OpenGL Square Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.4.1/lib/p5.js"></script>
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { border: 2px solid #555; display: block; }
    </style>
</head>
<body>
    <script>
        let x = -50;
        let speed = 3;

        function setup() {
            createCanvas(600, 400);
        }

        function draw() {
            background(0);
            fill(0, 180, 255);
            noStroke();
            rect(x, height/2 - 25, 50, 50);

            x += speed;
            if (x > width) x = -50;
        }
    </script>
</body>
</html>
